name: Publish npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish phonton-cli to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Resolve package version
        id: package
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Confirm GitHub release assets exist
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
        shell: bash
        run: |
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' > release-assets.txt
          grep -Fx "phonton-x86_64-unknown-linux-gnu.tar.gz" release-assets.txt
          grep -Fx "phonton-aarch64-apple-darwin.tar.gz" release-assets.txt
          grep -Fx "phonton-x86_64-pc-windows-msvc.zip" release-assets.txt

      - name: Confirm version is not already published
        env:
          VERSION: ${{ steps.package.outputs.version }}
        shell: bash
        run: |
          if npm view "phonton-cli@${VERSION}" version >/dev/null 2>&1; then
            echo "phonton-cli@${VERSION} is already published."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public

      - name: Verify npm version
        env:
          VERSION: ${{ steps.package.outputs.version }}
        shell: bash
        run: npm view "phonton-cli@${VERSION}" version
